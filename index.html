<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our First Month ❤️</title>

<style>

body{
margin:0;
padding:0;
font-family:'Segoe UI',sans-serif;
background:black;
color:white;
text-align:center;
}

.slideshow{
position:relative;
height:100vh;
width:100%;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:opacity 2s;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.active{
opacity:1;
}

.message{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.5);
padding:20px 30px;
border-radius:10px;
font-size:20px;
max-width:80%;
}

</style>
</head>

<body>

<div class="slideshow">

<div class="slide active">
<img src="photo1.jpg">
</div>

<div class="slide">
<img src="photo2.jpg">
</div>

<div class="slide">
<img src="photo3.jpg">
</div>

<div class="slide">
<img src="photo4.jpg">
</div>

<div class="slide">
<img src="photo5.jpg">
</div>

<div class="message">
Rose 🌹  
<br><br>
One month with you already feels special.  
Thank you for the smiles, the conversations,  
and the moments we've shared so far.  
<br><br>
Happy One Month Anniversary ❤️
</div>

</div>

<script>

let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(() => {

slides[index].classList.remove("active");

index = (index + 1) % slides.length;

slides[index].classList.add("active");

}, 4000);

</script>

</body>
</html>
