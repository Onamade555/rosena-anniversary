<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy One Month ❤️</title>

<style>

body{
margin:0;
padding:0;
font-family:'Segoe UI',sans-serif;
background: linear-gradient(135deg,#ff758c,#ff7eb3);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
max-width:700px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

h1{
color:#ff4d6d;
margin-bottom:10px;
}

p{
color:#555;
line-height:1.6;
}

.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:20px;
}

.gallery img{
width:100%;
border-radius:12px;
object-fit:cover;
height:200px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.gallery img:last-child{
grid-column:span 2;
height:250px;
}

button{
margin-top:25px;
padding:12px 25px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
box-shadow:0 10px 25px rgba(255,77,109,0.4);
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
}

.message{
display:none;
margin-top:20px;
font-size:18px;
color:#ff4d6d;
font-weight:600;
}

</style>
</head>

<body>

<div class="card">

<h1>Rose 🌹</h1>

<p>
Today marks our first month together.
It might be a short time to the world,
but it already means a lot to me.
</p>

<h2>Happy One Month Anniversary ❤️</h2>

<div class="gallery">

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
<img src="photo5.jpg">

</div>

<button onclick="showMessage()">Click for a surprise</button>

<div class="message" id="message">
Thank you for making this past month beautiful.
I look forward to many more moments with you. 💖
</div>

</div>

<script>

function showMessage(){
document.getElementById("message").style.display="block";
}

</script>

</body>
</html>
