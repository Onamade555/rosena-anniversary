<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>One Month with My Love 💕</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to bottom, #ffe6f2, #fff0f5);
      color: #333;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    /* Floating hearts animation */
    .hearts {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }
    .heart {
      position: absolute;
      font-size: 20px;
      color: #ff4d94;
      animation: float 10s linear infinite;
      opacity: 0.7;
    }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); }
      100% { transform: translateY(-150px) rotate(360deg); }
    }

    .container {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }
    h1 {
      font-size: 3.5rem;
      color: #e91e63;
      margin-bottom: 10px;
      text-shadow: 2px 2px 10px rgba(255, 105, 180, 0.5);
    }
    p.subtitle {
      font-size: 1.5rem;
      color: #555;
      margin-bottom: 30px;
    }
    .slideshow {
      width: 90%;
      max-width: 800px;
      height: 60vh;
      max-height: 500px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      background: #000;
      position: relative;
    }
    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 1.5s ease;
    }
    .slide.active {
      opacity: 1;
    }
    .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* Keeps full image visible, no cropping */
      background: #111; /* fallback if transparent edges */
    }
    .music-btn {
      margin-top: 30px;
      padding: 12px 30px;
      font-size: 1.2rem;
      background: #ff4081;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(255, 64, 129, 0.4);
      transition: all 0.3s;
    }
    .music-btn:hover {
      background: #f50057;
      transform: scale(1.05);
    }
    .footer {
      position: absolute;
      bottom: 20px;
      font-size: 1rem;
      color: #777;
    }

    @media (max-width: 768px) {
      h1 { font-size: 2.8rem; }
      .slideshow { height: 50vh; }
      p.subtitle { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <div class="hearts" id="hearts"></div>

  <div class="container">
    <h1>One Month of Us 💖</h1>
    <p class="subtitle">Happy 1-Month Anniversary, my love! Here's to many more moments like these...</p>

    <div class="slideshow">
      <div class="slide active"><img src="photo1.jpg" alt="Us 1"></div>
      <div class="slide"><img src="photo2.jpg" alt="Us 2"></div>
      <div class="slide"><img src="photo3.jpg" alt="Us 3"></div>
      <div class="slide"><img src="photo4.jpg" alt="Us 4"></div>
      <div class="slide"><img src="photo5.jpg" alt="Us 5"></div>
      <div class="slide"><img src="photo6.jpg" alt="Us 6"></div>
    </div>

    <button class="music-btn" id="musicToggle">Play Our Song ♫</button>

    <div class="footer">Made with all my love for you • March 2026</div>
  </div>

  <audio id="bgMusic" loop>
    <source src="our-song.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <script>
    // Slideshow auto-slide
    const slides = document.querySelectorAll('.slide');
    let current = 0;

    function nextSlide() {
      slides[current].classList.remove('active');
      current = (current + 1) % slides.length;
      slides[current].classList.add('active');
    }

    setInterval(nextSlide, 3000); // Change slide every 3 seconds

    // Music play/pause
    const audio = document.getElementById('bgMusic');
    const btn = document.getElementById('musicToggle');

    btn.addEventListener('click', () => {
      if (audio.paused) {
        audio.play();
        btn.textContent = 'Pause Music ♫';
      } else {
        audio.pause();
        btn.textContent = 'Play Our Song ♫';
      }
    });

    // Floating hearts
    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = '❤️';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (Math.random() * 5 + 8) + 's'; // 8-13s
      heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
      document.getElementById('hearts').appendChild(heart);

      setTimeout(() => heart.remove(), 15000);
    }

    setInterval(createHeart, 800); // New heart every 0.8s
  </script>
</body>
</html>
